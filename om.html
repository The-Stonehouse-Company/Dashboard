<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1100" />
  <title>Offer Memorandum · The Stonehouse Company</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Aboreto&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:         #000;
      --bg-elev:    #0e0e0e;
      --bg-elev-2:  #181818;
      --text:       #fff;
      --text-muted: #b8b8b8;
      --text-dim:   #777;
      --rule:       #2a2a2a;
      --rule-strong:#3a3a3a;
      --font-display: 'Aboreto', serif;
      --font-body:    'Montserrat', sans-serif;
      --tracking-wide:   .15em;
      --tracking-x-wide: .25em;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: #000;
      color: var(--text);
      font-family: var(--font-body);
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    /* Floating toolbar */
    .toolbar {
      position: fixed; top: 16px; right: 16px;
      display: flex; gap: 10px;
      z-index: 100;
      align-items: flex-start;
      max-width: calc(100vw - 32px);
    }
    .toolbar .tb-status {
      font-size: 10px; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: var(--tracking-wide);
      margin-right: 6px; max-width: 360px;
      white-space: normal; line-height: 1.5;
      text-align: right; padding-top: 10px;
    }
    .toolbar .tb-status.err  { color: #f4b9b9; }
    .toolbar .tb-status.warn { color: #e8d49a; }
    .toolbar .tb-btn {
      font: inherit; font-size: 11px;
      text-transform: uppercase; letter-spacing: var(--tracking-wide);
      padding: 12px 22px;
      color: var(--bg); background: var(--text);
      border: 1px solid var(--text);
      cursor: pointer; text-decoration: none;
      display: inline-block;
    }
    .toolbar .tb-btn.ghost {
      background: transparent; color: var(--text);
      padding: 10px 16px; font-weight: 300;
    }
    .toolbar .tb-btn:hover { opacity: .85; }
    .toolbar .tb-btn:disabled { opacity: .4; cursor: wait; }

    /* PAGE — landscape 10×5.625" widescreen.
       Width of 1000px → height 562.5px at 100% zoom. We render at this
       exact size on screen; html2canvas captures at scale:2 for crisp
       output. pdf-lib lays each captured page onto a 10×5.625in PDF page. */
    .om-page {
      width: 1000px;
      height: 562.5px;
      margin: 24px auto;
      background: #000;
      position: relative;
      overflow: hidden;
      color: var(--text);
    }

    /* Common arch / brand logo (bottom-left or bottom-center on most pages) */
    .om-logo {
      position: absolute;
      bottom: 22px; left: 22px;
      width: 38px; height: 38px;
      opacity: .95;
    }
    .om-logo img { width: 100%; height: 100%; display: block; }

    /* Page 1 — Cover */
    .om-page.cover {
      padding: 0;
    }
    .om-page.cover .cover-hero {
      position: absolute; inset: 0;
      background-color: #111;
      background-size: cover;
      background-position: center;
    }
    .om-page.cover .cover-hero::after {
      content: ""; position: absolute; inset: 0;
      background: linear-gradient(90deg, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.55) 45%, rgba(0,0,0,0.1) 80%, rgba(0,0,0,0.0) 100%);
    }
    .om-page.cover .date-stamp {
      position: absolute; top: 24px; right: 32px;
      font-size: 10px; color: var(--text-muted);
      letter-spacing: var(--tracking-x-wide);
    }
    .om-page.cover .cover-title {
      position: absolute; left: 48px; top: 110px;
      font-family: var(--font-display);
      font-size: 56px; line-height: 1.05; letter-spacing: .05em;
      text-transform: uppercase;
    }
    .om-page.cover .cover-subtitle {
      position: absolute; left: 48px; bottom: 110px;
      font-family: var(--font-body); font-weight: 600;
      font-size: 22px; letter-spacing: 0.12em;
      text-transform: uppercase;
      border-top: 1px solid rgba(255,255,255,0.6);
      padding-top: 14px;
      max-width: 700px;
    }
    .om-page.cover .cover-foot {
      position: absolute; left: 48px; bottom: 36px;
      font-size: 11px;
      letter-spacing: var(--tracking-x-wide);
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .om-page.cover .cover-brand {
      position: absolute; right: 36px; bottom: 36px;
      display: flex; align-items: center; gap: 10px;
    }
    .om-page.cover .cover-brand img {
      width: 44px; height: 44px;
    }
    .om-page.cover .cover-brand .brand-text {
      font-family: var(--font-display);
      font-size: 18px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* Generic 2-column "photo + writeup" page */
    .om-split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      height: 100%;
    }
    .om-split.right-text { /* photo left, writeup right */ }
    .om-split .pane-photo {
      background-color: #111;
      background-size: cover;
      background-position: center;
    }
    .om-split .pane-photo.empty {
      display: flex; align-items: center; justify-content: center;
      color: var(--text-dim);
      font-size: 10px; letter-spacing: var(--tracking-x-wide);
      text-transform: uppercase;
    }
    .om-split .pane-photo.empty::after {
      content: "Photo not provided";
    }
    .om-split .pane-text {
      padding: 56px 56px 80px;
      display: flex; flex-direction: column; justify-content: flex-start;
    }
    .om-split .pane-text h2 {
      font-family: var(--font-display);
      font-size: 26px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin: 0 0 26px;
      line-height: 1;
    }
    .om-split .pane-text p {
      font-size: 12.5px;
      line-height: 1.6;
      color: var(--text);
      margin: 0 0 14px;
      letter-spacing: .015em;
    }
    .om-split .pane-text p:last-child { margin-bottom: 0; }
    .om-split .pane-text .meta {
      margin-top: 22px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: var(--tracking-wide);
      color: var(--text-muted);
    }
    .om-split .pane-text .meta .row { padding: 4px 0; }

    /* "Anticipated build · vibe" page — text left + 2 image columns right */
    .om-vibe {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      height: 100%;
      gap: 14px;
      padding: 56px 56px 80px;
    }
    .om-vibe h2 {
      font-family: var(--font-display);
      font-size: 26px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin: 0 0 26px;
    }
    .om-vibe .vibe-text p {
      font-size: 12.5px; line-height: 1.6; margin: 0 0 14px;
    }
    .om-vibe .vibe-pane {
      display: flex; flex-direction: column;
    }
    .om-vibe .vibe-img {
      flex: 1;
      background-color: #111; background-size: cover; background-position: center;
    }
    .om-vibe .vibe-img.empty {
      display: flex; align-items: center; justify-content: center;
      color: var(--text-dim); font-size: 9px;
      letter-spacing: var(--tracking-x-wide); text-transform: uppercase;
    }
    .om-vibe .vibe-img.empty::after { content: "No photo"; }
    .om-vibe .vibe-caption {
      margin-top: 8px;
      font-size: 10px;
      letter-spacing: var(--tracking-x-wide);
      text-transform: uppercase;
      color: var(--text-muted);
    }

    /* Comparables grid (page 8 / 9) and Other Projects (page 10) */
    .om-grid {
      padding: 56px 56px 50px;
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    .om-grid h2 {
      font-family: var(--font-display);
      font-size: 22px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin: 0 0 28px;
    }
    .om-grid .three-up {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 28px;
      flex: 1;
    }
    .om-grid .grid-card {
      display: flex; flex-direction: column;
    }
    .om-grid .grid-card .card-img {
      width: 100%; height: 200px;
      background-color: #111;
      background-size: cover; background-position: center;
      margin-bottom: 14px;
    }
    .om-grid .grid-card .card-img.empty {
      display: flex; align-items: center; justify-content: center;
      color: var(--text-dim); font-size: 9px;
      letter-spacing: var(--tracking-x-wide); text-transform: uppercase;
    }
    .om-grid .grid-card .card-img.empty::after { content: "No photo"; }
    .om-grid .grid-card .card-address {
      font-family: var(--font-body); font-style: italic;
      font-size: 15px; margin-bottom: 8px; color: var(--text);
    }
    .om-grid .grid-card .card-row {
      font-size: 11.5px;
      color: var(--text);
      line-height: 1.5;
    }
    .om-grid .grid-card .card-row.status {
      font-weight: 600;
      letter-spacing: .04em;
    }

    /* Model page (page 11) — table-ish layout */
    .om-model {
      padding: 40px 50px 40px;
      height: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      font-size: 11px;
    }
    .om-model h2 {
      font-family: var(--font-display);
      font-size: 22px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin: 0 0 22px;
      grid-column: 1 / -1;
    }
    .om-model .prop-line {
      grid-column: 1 / -1;
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: .04em;
      margin-bottom: 6px;
    }
    .om-model .prop-line strong { color: var(--text); margin-left: 6px; }
    .om-model .sec-head {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: var(--tracking-wide);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .om-model .kv {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      padding: 4px 0;
      font-size: 11.5px;
    }
    .om-model .kv .v {
      font-family: var(--font-body); font-weight: 500;
      font-variant-numeric: tabular-nums;
      color: var(--text);
    }
    .om-model .col {
      display: flex; flex-direction: column;
    }
    .om-model .col .group { margin-bottom: 14px; }

    /* Financing & Profit Model (page 12) — full-width KV list */
    .om-financing {
      padding: 60px 80px;
      height: 100%;
      display: flex; flex-direction: column;
    }
    .om-financing h2 {
      font-family: var(--font-display);
      font-size: 22px; letter-spacing: 0.12em; text-transform: uppercase;
      margin: 0 0 32px;
    }
    .om-financing .kv-list {
      flex: 1;
      display: flex; flex-direction: column;
      gap: 6px;
    }
    .om-financing .kv-list .row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: baseline;
      padding: 9px 0;
      font-size: 12px;
      letter-spacing: .01em;
    }
    .om-financing .kv-list .row .k {
      font-weight: 600;
    }
    .om-financing .kv-list .row .v {
      font-variant-numeric: tabular-nums;
    }

    /* Summary page (page 14) - hero overlay + text */
    .om-page.summary {
      background-color: #111;
      background-size: cover; background-position: center;
    }
    .om-page.summary::after {
      content: ""; position: absolute; inset: 0;
      background: rgba(0,0,0,0.62);
    }
    .om-page.summary .summary-body {
      position: relative; z-index: 1;
      padding: 60px 80px;
      height: 100%;
      display: flex; flex-direction: column;
    }
    .om-page.summary h2 {
      font-family: var(--font-display);
      font-size: 26px; letter-spacing: 0.1em; text-transform: uppercase;
      margin: 0 0 18px;
      border-bottom: 1px solid rgba(255,255,255,0.5);
      padding-bottom: 14px;
    }
    .om-page.summary p {
      font-size: 12.5px;
      line-height: 1.6;
      margin: 0 0 14px;
    }
    .om-page.summary .brand-corner {
      position: absolute; top: 30px; right: 40px;
      display: flex; align-items: center; gap: 10px; z-index: 2;
    }
    .om-page.summary .brand-corner img { width: 40px; height: 40px; }
    .om-page.summary .brand-corner .text {
      font-family: var(--font-display);
      font-size: 16px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* Hide everything in print */
    @media print {
      .toolbar { display: none !important; }
      body { background: white; }
      .om-page { margin: 0; box-shadow: none; page-break-after: always; }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <span class="tb-status" id="tb-status">Loading…</span>
    <a class="tb-btn ghost" href="index.html#development">← Back</a>
    <button class="tb-btn" type="button" id="save-btn" disabled>Save as PDF</button>
  </div>

  <main id="output"></main>

  <script>
    // ============================================================
    // Offer Memorandum renderer
    //  Reads payload from IndexedDB (dashboard wrote it just before
    //  opening this tab), composes 14 widescreen pages, then
    //  pdf-lib (loaded on Save) assembles them as a single landscape
    //  PDF for download.
    // ============================================================

    // --- IDB transport ---
    function idbOpen() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open('stonehouse-dashboard', 2);
        req.onupgradeneeded = (e) => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains('onepager')) db.createObjectStore('onepager');
          if (!db.objectStoreNames.contains('om'))        db.createObjectStore('om');
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }
    async function idbGet(key) {
      const db = await idbOpen();
      return new Promise((resolve, reject) => {
        const tx = db.transaction('om', 'readonly');
        const req = tx.objectStore('om').get(key);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    async function loadPayload(onProgress) {
      const params = new URLSearchParams(window.location.search);
      const wantedReqId = params.get('req');
      for (let i = 0; i < 300; i++) {
        const data = await idbGet('current').catch(() => null);
        if (data && (!wantedReqId || data.requestId === wantedReqId)) return data;
        if (onProgress) onProgress(i, 300);
        await new Promise((r) => setTimeout(r, 300));
      }
      return null;
    }

    const statusEl = document.getElementById('tb-status');
    function setStatus(text, level) {
      statusEl.textContent = text;
      statusEl.classList.remove('warn', 'err');
      if (level === 'warn') statusEl.classList.add('warn');
      if (level === 'err')  statusEl.classList.add('err');
    }

    // --- Helpers ---
    const blobUrls = [];
    function blobToUrl(blob) {
      if (!blob) return '';
      const u = URL.createObjectURL(blob);
      blobUrls.push(u);
      return u;
    }

    // Convert a Blob → base64 data URL. Required because html2canvas does
    // NOT reliably capture blob: URLs used in CSS background-image during
    // its iframe-clone step. Data URLs survive that clone intact.
    function blobToDataUrl(blob) {
      return new Promise((resolve, reject) => {
        const fr = new FileReader();
        fr.onload  = () => resolve(fr.result);
        fr.onerror = () => reject(fr.error);
        fr.readAsDataURL(blob);
      });
    }
    // Walk the payload, replacing every Blob with a stored dataUrl. After
    // this runs, bgFromBlob can pull from file.dataUrl with no async.
    async function preprocessPhotos(d) {
      async function convert(p) {
        if (!p || !p.blob || p.dataUrl) return p;
        try { p.dataUrl = await blobToDataUrl(p.blob); }
        catch (err) { console.warn('blob→dataUrl failed', err); }
        return p;
      }
      const single = [
        'heroPhoto','existingPhoto','lotPhoto','mapPhoto',
        'exteriorPhoto','interiorPhoto','statsPhoto','pricingPhoto',
        'skylinePhoto',
      ];
      for (const k of single) { if (d[k]) await convert(d[k]); }
      for (const arr of [d.soldComps, d.singleStoryComps, d.otherProjects]) {
        if (Array.isArray(arr)) {
          for (const item of arr) {
            if (item && item.photo) await convert(item.photo);
          }
        }
      }
    }
    function esc(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }
    function nl2p(text) {
      if (!text) return '';
      return text.split(/\n{2,}/).map((p) => '<p>' + esc(p).replace(/\n/g, '<br/>') + '</p>').join('');
    }
    function fmtUSD0(n) {
      if (!isFinite(n) || !n) return '$0';
      return '$' + Math.round(n).toLocaleString('en-US');
    }
    function fmtPct(p, d = 2) {
      if (!isFinite(p)) return '0.00%';
      return (p * 100).toFixed(d) + '%';
    }
    function fmtMonthYear(iso) {
      const d = iso ? new Date(iso) : new Date();
      if (isNaN(d)) return '';
      return (d.getMonth() + 1) + ' / ' + d.getFullYear();
    }
    function logo() {
      return '<div class="om-logo"><img src="assets/icon-512.png" alt="The Stonehouse Company" /></div>';
    }
    function bgFromBlob(file) {
      if (!file) return '';
      // Prefer the dataUrl set by preprocessPhotos — survives html2canvas's
      // DOM clone reliably. Fall back to a fresh blob URL for on-screen
      // preview if dataUrl conversion failed for some reason.
      if (file.dataUrl) return 'background-image:url(' + JSON.stringify(file.dataUrl) + ');';
      if (file.blob)    return 'background-image:url(' + JSON.stringify(blobToUrl(file.blob)) + ');';
      return '';
    }

    // --- Translate a logged-deal row from the Underwriting Deal Log sheet
    //     into the shape pages 11 & 12 want. All values are already
    //     pre-computed in the sheet — we just need to derive a few
    //     summary numbers (total build, dev fee, etc.) from the inputs. ---
    function uwFromLog(uw) {
      if (!uw) return null;
      const numHomes = uw.numHomes || 0;
      const sqft     = uw.sqft || 0;
      const buildPsf = uw.buildPsf || 0;
      const salePsf  = uw.salePsf || 0;
      const constrMo = uw.constrMo || 0;
      const saleMo   = uw.saleMo || 0;
      const totalHold = constrMo + saleMo;

      const totalBuild = sqft * buildPsf * numHomes;
      const overrunPct = (uw.overrunPct || 0) / 100;
      const realtorPct = (uw.realtorPct || 0) / 100;
      const bankFeePct = (uw.bankFeePct || 0) / 100;
      const devFeePct  = (uw.devFeePct  || 0) / 100;
      const overrun    = totalBuild * overrunPct;
      const devFee     = ((uw.lotCost || 0) + totalBuild + overrun) * devFeePct;
      const grossSales = salePsf * sqft * numHomes;
      const realtor    = grossSales * realtorPct;
      const netRevenue = uw.netRevenue || (grossSales - realtor);

      return {
        numHomes, sqft, buildPsf, salePsf,
        constrMo, saleMo, totalHold,
        lotCost:    uw.lotCost     || 0,
        totalBuild, overrun, devFee,
        taxes:      uw.taxes       || 0,
        title:      uw.title       || 0,
        pool:       uw.pool        || 0,
        designer:   uw.designer    || 0,
        architect:  uw.architect   || 0,
        bankFees:   uw.bankFees    || 0,
        interest:   uw.interest    || 0,
        tpc:        uw.tpc         || 0,
        equity:     uw.equity      || 0,
        equityPer:  uw.equityPer   || 0,
        loan:       uw.loan        || 0,
        landLoan:   uw.landLoan    || 0,
        salePerHome: salePsf * sqft,
        grossSales, realtor, netRevenue,
        grossProfit: uw.grossProfit || 0,
        profitMargin:(uw.margin     || 0) / 100,
        roe:         (uw.roe        || 0) / 100,
        roc:         (uw.roc        || 0) / 100,
        roeAnn:      (uw.roeAnn     || 0) / 100,
        profitPerHome: uw.profitPerHome || 0,
        devNet:        uw.devNet || 0,
        breakEven:     uw.breakEven || 0,
        overrunPct, realtorPct, bankFeePct, devFeePct,
        // Scenario context
        scenario:     uw.scenario || '',
      };
    }

    // --- Page renderers ---
    function pageCover(d) {
      return (
        '<section class="om-page cover">' +
          '<div class="cover-hero" style="' + bgFromBlob(d.heroPhoto) + '"></div>' +
          '<div class="date-stamp">' + esc(fmtMonthYear(d.generatedAt)) + '</div>' +
          '<div class="cover-title">Offer<br/>Memorandum</div>' +
          '<div class="cover-subtitle">' +
            esc(d.projectName || 'Project') +
            (d.neighborhood ? ' &nbsp;|&nbsp; ' + esc(d.neighborhood) : '') +
          '</div>' +
          '<div class="cover-foot">The Stonehouse Company &nbsp;·&nbsp; Development</div>' +
          '<div class="cover-brand">' +
            '<img src="assets/icon-512.png" alt="The Stonehouse Company" />' +
            '<span class="brand-text">The Stonehouse Co.</span>' +
          '</div>' +
        '</section>'
      );
    }

    function pageOverview(d) {
      const metaRows = [];
      if (d.constructionStart) metaRows.push('<div class="row">Construction is set to begin ' + esc(d.constructionStart) + '</div>');
      if (d.completion)        metaRows.push('<div class="row">Our expected completion is ' + esc(d.completion) + '</div>');
      return (
        '<section class="om-page">' +
          '<div class="om-split">' +
            '<div class="pane-photo' + (d.existingPhoto ? '' : ' empty') + '" style="' + bgFromBlob(d.existingPhoto) + '"></div>' +
            '<div class="pane-text">' +
              '<h2>Overview / Writeup</h2>' +
              (d.overviewText ? nl2p(d.overviewText) : '<p style="color:var(--text-dim);">(Overview writeup not yet provided.)</p>') +
              (metaRows.length ? '<div class="meta">' + metaRows.join('') + '</div>' : '') +
            '</div>' +
          '</div>' +
          logo() +
        '</section>'
      );
    }

    function pageLot(d) {
      return (
        '<section class="om-page">' +
          '<div class="om-split">' +
            '<div class="pane-photo' + (d.lotPhoto ? '' : ' empty') + '" style="' + bgFromBlob(d.lotPhoto) + '"></div>' +

    // --- PDF assembly ---
    const saveBtn = document.getElementById('save-btn');
    let libsPromise = null;
    function loadLibs() {
      if (libsPromise) return libsPromise;
      function loadScript(src) {
        return new Promise((res, rej) => {
          const s = document.createElement('script');
          s.src = src; s.onload = () => res(); s.onerror = () => rej(new Error('Failed to load ' + src));
          document.head.appendChild(s);
        });
      }
      libsPromise = Promise.all([
        loadScript('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js'),
        loadScript('https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js'),
      ]).then(() => {
        if (!window.html2canvas) throw new Error('html2canvas not available');
        if (!window.PDFLib || !window.PDFLib.PDFDocument) throw new Error('pdf-lib not available');
        return {
          html2canvas: window.html2canvas,
          PDFDocument: window.PDFLib.PDFDocument,
          rgb: window.PDFLib.rgb,
        };
      });
      return libsPromise;
    }

    // 10×5.625" page: 720 × 405 points
    const PAGE_W_PT = 720;
    const PAGE_H_PT = 405;

    function cleanFilename(s) {
      return String(s || 'OM').replace(/[^a-z0-9]+/gi, '-').replace(/^-|-$/g, '').slice(0, 60) || 'OM';
    }

    function blobToArrayBuffer(blob) {
      if (blob.arrayBuffer) return blob.arrayBuffer();
      return new Promise((resolve, reject) => {
        const fr = new FileReader();
        fr.onload = () => resolve(fr.result);
        fr.onerror = () => reject(fr.error);
        fr.readAsArrayBuffer(blob);
      });
    }
    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename;
      document.body.appendChild(a); a.click();
      setTimeout(() => { try { document.body.removeChild(a); } catch(_){} URL.revokeObjectURL(url); }, 1000);
    }

    async function buildPdf(payload) {
      const originalLabel = saveBtn.textContent;
      saveBtn.disabled = true;
      saveBtn.textContent = 'Building…';
      setStatus('Loading PDF engine…');
      try {
        const { html2canvas, PDFDocument, rgb } = await loadLibs();
        const pages = Array.from(document.querySelectorAll('.om-page'));
        const out = await PDFDocument.create();
        for (let i = 0; i < pages.length; i++) {
          setStatus('Rendering page ' + (i + 1) + ' of ' + pages.length + '…');
          const canvas = await html2canvas(pages[i], {
            scale: 2,
            backgroundColor: '#000000',
            useCORS: true,
            logging: false,
          });
          const jpegBlob = await new Promise((res, rej) =>
            canvas.toBlob((b) => b ? res(b) : rej(new Error('canvas.toBlob null')), 'image/jpeg', 0.92)
          );
          const bytes = await blobToArrayBuffer(jpegBlob);
          const img = await out.embedJpg(bytes);
          const page = out.addPage([PAGE_W_PT, PAGE_H_PT]);
          page.drawRectangle({ x: 0, y: 0, width: PAGE_W_PT, height: PAGE_H_PT, color: rgb(0, 0, 0) });
          // Fit image to page (same aspect, but be defensive)
          const ratio = canvas.width / canvas.height;
          const pageRatio = PAGE_W_PT / PAGE_H_PT;
          let w, h, x, y;
          if (ratio >= pageRatio) {
            w = PAGE_W_PT; h = PAGE_W_PT / ratio; x = 0; y = (PAGE_H_PT - h) / 2;
          } else {
            h = PAGE_H_PT; w = PAGE_H_PT * ratio; y = 0; x = (PAGE_W_PT - w) / 2;
          }
          page.drawImage(img, { x: x, y: y, width: w, height: h });
          await new Promise((r) => setTimeout(r, 60));
        }
        setStatus('Saving…');
        const pdfBytes = await out.save();
        const blob = new Blob([pdfBytes], { type: 'application/pdf' });
        const filename = 'OM-' + cleanFilename((payload && payload.projectName) || (payload && payload.address) || 'project') + '.pdf';
        downloadBlob(blob, filename);
        setStatus('Saved: ' + filename + ' (' + pages.length + ' pages)');
      } catch (err) {
        console.error('OM PDF build failed:', err);
        setStatus('PDF failed: ' + (err && err.message ? err.message : 'unknown error'), 'err');
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = originalLabel;
      }
    }

    let __payload = null;
    saveBtn.addEventListener('click', () => __payload && buildPdf(__payload));

    async function whenReady() {
      const imgs = Array.from(document.querySelectorAll('img'));
      await Promise.all(imgs.map((img) =>
        img.complete && img.naturalWidth ? Promise.resolve()
        : new Promise((res) => { img.onload = img.onerror = res; })
      ));
      if (document.fonts && document.fonts.ready) await document.fonts.ready;
      await new Promise((r) => setTimeout(r, 300));
    }

    (async () => {
      setStatus('Waiting for data…');
      const d = await loadPayload((i) => {
        const sec = Math.round((i + 1) * 300 / 1000);
        if (i >= 30 && i < 60) setStatus('Still working… ' + sec + 's');
        else if (i >= 60) setStatus('Waiting on dashboard… ' + sec + 's');
      });
      if (!d) {
        setStatus('No data', 'err');
        return;
      }
      __payload = d;
      setStatus('Preparing photos…');
      // Convert every uploaded photo to a base64 data URL so they survive
      // html2canvas's DOM clone when we capture each page for the PDF.
      await preprocessPhotos(d);
      setStatus('Rendering…');
      render(d);
      await whenReady();
      setStatus('Ready · 14 pages');
      saveBtn.disabled = false;
    })();
  </script>
