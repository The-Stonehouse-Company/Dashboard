<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Comparative's Presentation · The Stonehouse Company</title>

  <!-- Same brand fonts as the rest of the dashboard / feasibility docs -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Aboreto&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet" />

  <!-- html2canvas + jsPDF for client-side PDF generation -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    :root {
      --bg:       #000000;
      --bg-elev:  #0e0e0e;
      --bg-elev2: #181818;
      --text:     #ffffff;
      --muted:    #b8b8b8;
      --dim:      #777777;
      --rule:     #2a2a2a;
      --accent:   #d9c8a3;
      --tracking-wide:  0.14em;
      --tracking-xwide: 0.22em;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Montserrat', system-ui, -apple-system, sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
    }
    h1, h2, h3, .display { font-family: 'Aboreto', serif; font-weight: 400; }

    /* Toolbar at the top — not part of PDF output */
    .toolbar {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--rule);
      padding: 14px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .toolbar-title {
      font-family: 'Aboreto', serif;
      font-size: 13px;
      letter-spacing: var(--tracking-xwide);
      text-transform: uppercase;
    }
    .toolbar-actions { display: flex; gap: 12px; }
    .btn-pdf, .btn-ghost {
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      letter-spacing: var(--tracking-wide);
      text-transform: uppercase;
      padding: 10px 18px;
      border: 1px solid var(--text);
      background: var(--text);
      color: var(--bg);
      cursor: pointer;
    }
    .btn-pdf:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-ghost {
      background: transparent;
      color: var(--text);
    }
    .status {
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 0.04em;
      margin-right: 18px;
    }

    /* PDF pages — sized to letter landscape ratio (11 × 8.5 in = 1.294).
       Using 1320 × 1020 px keeps things crisp at print resolution and
       prevents the html2canvas → jsPDF squish that happened with 16:9. */
    #cma-output { padding: 28px; }
    .page {
      width: 1320px;
      height: 1020px;
      margin: 0 auto 28px;
      background: var(--bg);
      color: var(--text);
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 0 1px var(--rule);
    }

    /* ===== Cover page (Page 1) ===== */
    .cover {
      background-position: center;
      background-size: cover;
      background-color: var(--bg-elev);
    }
    .cover::after {
      /* gradient overlay so the title remains legible on any photo */
      content: "";
      position: absolute; inset: 0;
      background: linear-gradient(180deg,
        rgba(0,0,0,0.20) 0%,
        rgba(0,0,0,0.10) 35%,
        rgba(0,0,0,0.55) 100%);
      pointer-events: none;
    }
    .cover-date {
      position: absolute;
      top: 40px; right: 50px;
      font-size: 15px;
      letter-spacing: 0.06em;
      color: var(--text);
      z-index: 2;
    }
    .cover-title {
      position: absolute;
      top: 270px; left: 80px;
      font-size: 100px;
      letter-spacing: 0.04em;
      color: var(--text);
      z-index: 2;
      line-height: 1.0;
      margin: 0;
    }
    .cover-address {
      position: absolute;
      top: 440px; left: 80px;   /* generous gap below COMPARABLES title */
      font-family: 'Aboreto', serif;
      font-size: 42px;
      letter-spacing: 0.02em;
      color: var(--text);
      z-index: 2;
    }
    .cover-company {
      position: absolute;
      bottom: 50px; left: 80px;
      font-family: 'Aboreto', serif;
      font-size: 16px;
      letter-spacing: var(--tracking-xwide);
      text-transform: uppercase;
      color: var(--text);
      z-index: 2;
    }
    .cover-logo {
      position: absolute;
      bottom: 50px; right: 70px;
      width: 110px;
      height: 110px;
      z-index: 2;
      opacity: 0.95;
    }

    /* ===== Comparables pages (2..N) ===== */
    .comps-page {
      padding: 80px 90px 70px;
      display: flex;
      flex-direction: column;
    }
    .comps-header {
      font-family: 'Aboreto', serif;
      font-size: 38px;
      letter-spacing: 0.04em;
      margin-bottom: 60px;
      color: var(--text);
    }
    .comps-header .dash { color: var(--accent); margin: 0 18px; }
    .comps-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 30px;
      flex: 1;
    }
    .comps-grid.is-two   { grid-template-columns: repeat(2, 1fr); }
    .comps-grid.is-one   { grid-template-columns: 1fr; max-width: 480px; }

    .comp-card { display: flex; flex-direction: column; }
    .comp-card .photo {
      width: 100%;
      aspect-ratio: 16 / 11;
      background: var(--bg-elev2);
      background-size: cover;
      background-position: center;
      border: 1px solid var(--rule);
    }
    .comp-card .address {
      font-family: 'Aboreto', serif;
      font-style: italic;
      font-size: 26px;
      letter-spacing: 0.01em;
      margin: 22px 0 14px;
      line-height: 1.15;
    }
    .comp-card .specs,
    .comp-card .price,
    .comp-card .status {
      font-size: 14px;
      color: var(--text);
      letter-spacing: 0.02em;
      margin: 4px 0;
      line-height: 1.45;
    }
    .comp-card .status { color: var(--muted); }

    /* Tiny "STONEHOUSE" wordmark + arch logo bottom-right on each comp page */
    .page-footer-brand {
      position: absolute;
      bottom: 24px; right: 36px;
      display: flex;
      align-items: center;
      gap: 12px;
      opacity: 0.85;
      z-index: 2;
    }
    .page-footer-brand img {
      width: 54px;
      height: 54px;
    }
    .page-footer-brand .wordmark {
      font-family: 'Aboreto', serif;
      font-size: 9px;
      letter-spacing: var(--tracking-xwide);
      text-transform: uppercase;
      color: var(--muted);
      text-align: right;
      line-height: 1.3;
    }

    /* ===== Links page (final, optional) ===== */
    .links-page {
      padding: 80px 90px;
    }
    .links-page .header {
      font-family: 'Aboreto', serif;
      font-size: 30px;
      letter-spacing: 0.04em;
      margin-bottom: 50px;
    }
    .links-page .link-block {
      margin-bottom: 32px;
    }
    .links-page .link-label {
      font-family: 'Aboreto', serif;
      font-size: 16px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text);
      margin-right: 14px;
    }
    .links-page .link-url {
      font-size: 14px;
      color: var(--accent);
      text-decoration: underline;
      word-break: break-all;
    }
  </style>
</head>
<body>

  <div class="toolbar">
    <div class="toolbar-title">Comparative's Presentation · The Stonehouse Company</div>
    <div class="toolbar-actions">
      <span class="status" id="status"></span>
      <button class="btn-ghost" type="button" onclick="window.close()">Close</button>
      <button class="btn-pdf" type="button" id="download-btn" disabled>Download PDF</button>
    </div>
  </div>

  <div id="cma-output"><!-- pages rendered here by JS --></div>

  <script>
    'use strict';

    // ----- Read the "current" record written by the modal -----
    function dbOpen() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open('stonehouse-cma', 1);
        req.onupgradeneeded = () => {
          const db = req.result;
          if (!db.objectStoreNames.contains('cma')) {
            db.createObjectStore('cma', { keyPath: 'id' });
          }
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror   = () => reject(req.error);
      });
    }
    async function dbGet() {
      const db = await dbOpen();
      return new Promise((resolve) => {
        const tx = db.transaction('cma', 'readonly');
        const req = tx.objectStore('cma').get('current');
        req.onsuccess = () => resolve(req.result || null);
        req.onerror   = () => resolve(null);
      });
    }

    // ----- Render -----
    function esc(s) { return String(s || '').replace(/[<>&]/g, ch => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[ch])); }

    function renderCompCard(c) {
      const photoStyle = c.photo ? 'style="background-image:url(' + c.photo + ');"' : '';
      return (
        '<div class="comp-card">' +
          '<div class="photo" ' + photoStyle + '></div>' +
          '<div class="address">' + esc(c.address) + '</div>' +
          (c.specs  ? '<div class="specs">'  + esc(c.specs)  + '</div>' : '') +
          (c.price  ? '<div class="price">'  + esc(c.price)  + '</div>' : '') +
          (c.status ? '<div class="status">' + esc(c.status) + '</div>' : '') +
        '</div>'
      );
    }

    function renderCompPage(title, status, comps) {
      // status is "Under Contract" or "Sold"
      if (!comps || comps.length === 0) return '';
      const gridCls = comps.length === 1 ? 'is-one' : comps.length === 2 ? 'is-two' : '';
      return (
        '<section class="page comps-page">' +
          '<div class="comps-header">' +
            esc(title) + '<span class="dash">–</span>' + esc(status) +
          '</div>' +
          '<div class="comps-grid ' + gridCls + '">' +
            comps.map(renderCompCard).join('') +
          '</div>' +
          '<div class="page-footer-brand">' +
            '<div class="wordmark">The Stonehouse<br/>Company</div>' +
            '<img src="assets/icon-arch-transparent.png" alt="" />' +
          '</div>' +
        '</section>'
      );
    }

    function renderCover(d) {
      const heroStyle = d.subject.hero
        ? 'style="background-image:url(' + d.subject.hero + ');"'
        : '';
      return (
        '<section class="page cover" ' + heroStyle + '>' +
          (d.subject.date ? '<div class="cover-date">' + esc(d.subject.date) + '</div>' : '') +
          '<h1 class="cover-title">COMPARABLES</h1>' +
          '<div class="cover-address">' + esc(d.subject.address) + '</div>' +
          '<div class="cover-company">The Stonehouse Company</div>' +
          '<img class="cover-logo" src="assets/icon-arch-transparent.png" alt="Stonehouse" />' +
        '</section>'
      );
    }

    function renderLinks(d) {
      const hasComps = !!(d.links && d.links.comparables);
      const hasCma   = !!(d.links && d.links.cma);
      if (!hasComps && !hasCma) return '';
      return (
        '<section class="page links-page">' +
          '<div class="header">Sources</div>' +
          (hasComps ? (
            '<div class="link-block">' +
              '<span class="link-label">Comparables:</span> ' +
              '<span class="link-url">' + esc(d.links.comparables) + '</span>' +
            '</div>'
          ) : '') +
          (hasCma ? (
            '<div class="link-block">' +
              '<span class="link-label">CMA:</span> ' +
              '<span class="link-url">' + esc(d.links.cma) + '</span>' +
            '</div>'
          ) : '') +
          '<div class="page-footer-brand">' +
            '<div class="wordmark">The Stonehouse<br/>Company</div>' +
            '<img src="assets/icon-arch-transparent.png" alt="" />' +
          '</div>' +
        '</section>'
      );
    }

    // Split sold comps so each page shows at most 3.
    function chunkSold(soldArr) {
      const chunks = [];
      const arr = soldArr.slice();
      while (arr.length) chunks.push(arr.splice(0, 3));
      return chunks;
    }

    async function render() {
      const data = await dbGet();
      const out = document.getElementById('cma-output');
      if (!data) {
        out.innerHTML = '<p style="color:#b8b8b8;padding:40px;">No CMA data found. Open the CMA Generator from the dashboard and submit the form first.</p>';
        return;
      }

      const parts = [];
      parts.push(renderCover(data));
      if (data.underContract && data.underContract.length) {
        parts.push(renderCompPage('Comparables', 'Under Contract', data.underContract));
      }
      const soldChunks = chunkSold(data.sold || []);
      soldChunks.forEach(chunk => parts.push(renderCompPage('Comparables', 'Sold', chunk)));
      const linksHtml = renderLinks(data);
      if (linksHtml) parts.push(linksHtml);

      out.innerHTML = parts.join('');

      // Once rendered, enable the download button
      const btn = document.getElementById('download-btn');
      btn.disabled = false;

      btn.addEventListener('click', async () => {
        btn.disabled = true;
        const status = document.getElementById('status');
        status.textContent = 'Rendering PDF…';

        try {
          const { jsPDF } = window.jspdf;
          // Landscape letter — 11 x 8.5 in — matches Liebo CMA slide deck orientation
          const pdf = new jsPDF({ orientation: 'landscape', unit: 'in', format: 'letter' });
          const pages = document.querySelectorAll('.page');
          for (let i = 0; i < pages.length; i++) {
            status.textContent = 'Rendering page ' + (i + 1) + ' of ' + pages.length + '…';
            const canvas = await html2canvas(pages[i], {
              backgroundColor: '#000000',
              scale: 2,
              useCORS: true,
            });
            const img = canvas.toDataURL('image/jpeg', 0.92);
            if (i > 0) pdf.addPage('letter', 'landscape');
            pdf.addImage(img, 'JPEG', 0, 0, 11, 8.5);
          }
          const fileName = 'Stonehouse-Comparatives-Presentation-' +
            (data.subject.address || 'untitled').replace(/[^A-Za-z0-9]+/g, '-') +
            '.pdf';
          pdf.save(fileName);
          status.textContent = 'Downloaded.';
        } catch (err) {
          console.error('PDF render failed', err);
          status.textContent = 'PDF render failed — see console.';
        } finally {
          btn.disabled = false;
          setTimeout(() => { document.getElementById('status').textContent = ''; }, 2500);
        }
      });
    }

    render();
  </script>
</body>
</html>
